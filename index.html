<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniRealm | Ultimate Experience</title>
    
    <meta property="og:title" content="AniRealm">
    <meta name="description" content="Explore the ultimate anime and manga experience at AniRealm.">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen" role="presentation" aria-hidden="true">
        <div class="splash-content">
            <h1 class="splash-logo">
                <span class="letter">A</span>
                <span class="letter">n</span>
                <span class="letter">i</span>
                <span class="letter shadow">R</span>
                <span class="letter">e</span>
                <span class="letter">a</span>
                <span class="letter">l</span>
                <span class="letter">m</span>
            </h1>
        </div>
    </div>

    <div class="glow-bg" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>
    <div id="notificationHost" aria-live="polite"></div>

    <div id="authModal" class="modal" role="dialog" aria-modal="true" style="display: none;">
        <div class="modal-content auth-modal-box">
            <span class="close-modal" onclick="closeAuthModal()" onkeydown="if(event.key === 'Enter') closeAuthModal()" role="button" aria-label="Close authentication modal" tabindex="0">&times;</span>
            <div class="auth-container">
                <h2 id="authTitle">Sign In</h2>
                <form id="authForm" onsubmit="handleAuthSubmit(event)">
                    
                    <div id="usernameFieldWrapper" class="input-group" style="display: none;">
                        <input type="text" id="authUsername" placeholder="Username">
                    </div>

                    <div class="input-group">
                        <input type="text" id="authEmail" placeholder="Email or Username" required>
                    </div>

                    <div class="input-group">
                        <input type="password" id="authPassword" placeholder="Password" required>
                    </div>

                    <div id="forgotPasswordWrapper">
                        <a href="#" id="forgotPasswordLink" onclick="handleForgotPassword(event)">Forgot Password?</a>
                    </div>

                    <button type="submit" id="authSubmitBtn">Sign In</button>
                </form>
                <p id="authSwitchText">
                    Don't have an account? <a href="#" onclick="toggleAuthMode(event)">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" onclick="if(event.target == this) closeModal()">
        <div class="modal-content" id="modalContainerWindow" style="max-width: 680px; padding: 0; overflow: hidden; border-radius: 16px;">
            <span class="close-modal" onclick="closeModal()" onkeydown="if(event.key === 'Enter') closeModal()" role="button" aria-label="Close modal" tabindex="0" style="position: absolute; right: 20px; top: 15px; z-index: 10; color: #fff; background: rgba(0,0,0,0.5); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.2rem;">&times;</span>
            <div id="modalBody" class="modal-flex"></div>
        </div>
    </div>

    <nav class="sidebar" aria-label="Main Navigation">
        <div class="logo" onclick="setMode('top/anime', 'topAnime')" onkeydown="if(event.key === 'Enter') setMode('top/anime', 'topAnime')" role="button" tabindex="0" aria-label="AniRealm Home">A<span>R</span></div>
        
        <div class="nav-links-vertical">
            <button class="nav-btn active" id="topAnime" onclick="setMode('top/anime', 'topAnime')" title="Anime" aria-label="View Top Anime"><i class="fas fa-tv" aria-hidden="true"></i></button>
            <button class="nav-btn" id="topManga" onclick="setMode('top/manga', 'topManga')" title="Manga" aria-label="View Top Manga"><i class="fas fa-book-open" aria-hidden="true"></i></button>
            <button class="nav-btn" id="topNovels" onclick="setMode('top/manga?type=novel', 'topNovels')" title="Novels" aria-label="View Light Novels"><i class="fas fa-scroll" aria-hidden="true"></i></button>
            <button class="nav-btn" id="trending" onclick="setMode('seasons/now', 'trending')" title="Trending" aria-label="View Trending"><i class="fas fa-fire" aria-hidden="true"></i></button>
            <button class="nav-btn" id="myList" onclick="setMode('mylist', 'myList')" title="Collection" aria-label="View My Collection"><i class="fas fa-bookmark" aria-hidden="true"></i></button>
            
            <div class="nav-divider"></div>
            
            <button class="nav-btn dice-btn" onclick="getRandom()" title="Surprise Me" aria-label="Get Random Recommendation"><i class="fas fa-dice" aria-hidden="true"></i></button>
            
            <button class="nav-btn" id="authNavBtn" onclick="openAuthModal()" title="Login" style="color: var(--primary);"><i class="fas fa-user-circle"></i></button>
        </div>
    </nav>

    <div class="main-content">
        <header class="top-nav">
            <form class="search-wrapper" id="searchWrapper" onsubmit="return false;">
                <i class="fas fa-search" aria-hidden="true"></i>
                <input type="search" id="searchInput" placeholder="Search across titles..." autocomplete="off" aria-label="Search titles">
            </form>
            <button id="clearAllBtn" class="clear-btn" onclick="clearFullList()" style="display: none;">
                <i class="fas fa-trash-alt" aria-hidden="true"></i> Clear Collection
            </button>
        </header>

        <main>
            <section class="hero-header">
                <h1 id="sectionTitle">Global Top Rated</h1>
                <div class="accent-line"></div>
                
                <nav class="genre-container" id="genreContainer" aria-label="Genre Filters">
                    <button class="genre-tag active" onclick="filterByGenre(null, this)">All</button>
                    <button class="genre-tag" onclick="filterByGenre(1, this)">Action</button>
                    <button class="genre-tag" onclick="filterByGenre(2, this)">Adventure</button>
                    <button class="genre-tag" onclick="filterByGenre(4, this)">Comedy</button>
                    <button class="genre-tag" onclick="filterByGenre(8, this)">Drama</button>
                    <button class="genre-tag" onclick="filterByGenre(10, this)">Fantasy</button>
                    <button class="genre-tag" onclick="filterByGenre(22, this)">Romance</button>
                    <button class="genre-tag" onclick="filterByGenre(24, this)">Sci-Fi</button>
                </nav>
            </section>

            <section class="results-grid" id="resultsGrid"></section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
